name: PyNEAT Security Scan

on:
  schedule:
    - cron: '0 0 * * *'  # Run daily at midnight
  workflow_dispatch:  # Manual trigger

jobs:
  security-scan:
    name: Scan for Security Vulnerabilities
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyNEAT
        run: pip install pyneat-cli

      - name: Run Security Scan
        id: scan
        run: |
          pyneat check . --output-format sarif --output pyneat-results.sarif || true

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: pyneat-results.sarif
          category: pyneat-security-scan

      - name: Post scan results to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('pyneat-results.json', 'utf8'));
            const summary = results.summary || {};
            
            const message = `
            ## PyNEAT Security Scan Results
            
            | Severity | Count |
            |----------|-------|
            | CRITICAL | ${summary.critical || 0} |
            | HIGH | ${summary.high || 0} |
            | MEDIUM | ${summary.medium || 0} |
            | LOW | ${summary.low || 0} |
            | INFO | ${summary.info || 0} |
            
            Total: ${summary.total || 0} issues found.
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });
