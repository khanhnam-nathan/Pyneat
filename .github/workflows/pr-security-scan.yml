# PyNEAT PR Security Scan Workflow
#
# Runs comprehensive security scanning on every pull request.
# Uploads results to GitHub Code Scanning and blocks PRs with critical issues.

name: PyNEAT PR Security Scan

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**.py'
      - '**.js'
      - '**.ts'
      - '**.jsx'
      - '**.tsx'
      - '**.go'
      - '**.java'
      - '**.rs'
      - '**.cs'
      - '**.php'
      - '**.rb'
      - '**.tf'
      - '**.yaml'
      - '**.yml'
      - '**.json'
  workflow_dispatch:
    inputs:
      target:
        description: 'Target directory or file to scan'
        required: false
        default: '.'

permissions:
  contents: read
  security-events: write
  pull-requests: write
  statuses: write

env:
  PYNEAT_VERSION: "3.0.0"

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1: Secrets Scanning (fastest, runs first)
  # ---------------------------------------------------------------------------
  secrets-scan:
    name: Secrets Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyNEAT
        run: pip install pyneat-cli==${{ env.PYNEAT_VERSION }}

      - name: Run secrets scan
        id: secrets
        run: |
          pyneat check . --lang python --severity --fail-on critical --format sarif --output secrets-scan.sarif || true

      - name: Upload secrets SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: secrets-scan.sarif
          category: "pyneat-secrets-scan"

      - name: Comment on PR with secrets findings
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('secrets-scan.sarif')) return;
            const sarif = JSON.parse(fs.readFileSync('secrets-scan.sarif', 'utf8'));
            const results = sarif.runs?.[0]?.results || [];
            const critical = results.filter(r => r.level === 'error').length;
            if (critical > 0) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## 🔒 Secrets Scanning\n\nDetected **${critical}** hardcoded secret(s) in this PR.\n\n<details>\n<summary>View details</summary>\n\n${results.slice(0, 10).map(r => `- \`${r.ruleId}\` at ${r.locations?.[0]?.physicalLocation?.artifactLocation?.uri}:${r.locations?.[0]?.physicalLocation?.region?.startLine}`).join('\n')}\n\n</details>\n\n*Powered by [PyNEAT](https://github.com/pyneat/pyneat)*`
              });
            }

  # ---------------------------------------------------------------------------
  # Stage 2: Multi-language Security Scan
  # ---------------------------------------------------------------------------
  security-scan:
    name: Security Scan (Multi-Language)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lang:
          - python
          - javascript
          - typescript
          - go
          - java
          - rust
          - ruby
          - php
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyNEAT
        run: pip install pyneat-cli==${{ env.PYNEAT_VERSION }}

      - name: Scan ${{ matrix.lang }}
        id: scan
        run: |
          pyneat check . --lang ${{ matrix.lang }} --severity --format sarif --output scan-${{ matrix.lang }}.sarif || true

      - name: Upload SARIF (${{ matrix.lang }})
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: scan-${{ matrix.lang }}.sarif
          category: "pyneat-${{ matrix.lang }}-scan"

      - name: Parse findings
        id: parse
        run: |
          TOTAL=$(cat scan-${{ matrix.lang }}.sarif 2>/dev/null | python3 -c "import json,sys; d=json.load(sys.stdin); print(len(d.get('runs',[{}])[0].get('results',[])))" 2>/dev/null || echo "0")
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          CRITICAL=$(cat scan-${{ matrix.lang }}.sarif 2>/dev/null | python3 -c "import json,sys; d=json.load(sys.stdin); print(len([r for r in d.get('runs',[{}])[0].get('results',[]) if r.get('level')=='error']))" 2>/dev/null || echo "0")
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT

      - name: Check blocking severity
        id: block-check
        if: matrix.lang == 'python'
        run: |
          # Check if any critical/high issues found across all languages
          echo "Blocking status based on Python scan (primary language)"
          echo "critical=${{ steps.parse.outputs.critical }}"

  # ---------------------------------------------------------------------------
  # Stage 3: Dependency Audit
  # ---------------------------------------------------------------------------
  dependency-audit:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyNEAT
        run: pip install pyneat-cli==${{ env.PYNEAT_VERSION }}

      - name: Discover lock files
        run: |
          pyneat check . --lock-files || true

      - name: Audit dependencies
        id: audit
        run: |
          pyneat audit-deps --path requirements.txt --format sarif --output deps-audit.sarif || true

      - name: Upload dependency SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: deps-audit.sarif
          category: "pyneat-dependency-audit"

  # ---------------------------------------------------------------------------
  # Stage 4: IaC Security Scan (Terraform, Kubernetes)
  # ---------------------------------------------------------------------------
  iac-scan:
    name: IaC Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyNEAT
        run: pip install pyneat-cli==${{ env.PYNEAT_VERSION }}

      - name: Scan IaC files
        id: iac
        run: |
          # Scan Terraform files
          find . -name "*.tf" -type f 2>/dev/null | head -50 | while read f; do
            pyneat check "$f" --severity --format sarif --output "iac-$(echo $f | sed 's|/|__|g').sarif" 2>/dev/null || true
          done
          # Scan Kubernetes YAML files
          find . \( -name "*.yaml" -o -name "*.yml" \) -type f 2>/dev/null | xargs grep -l "kind:" 2>/dev/null | head -50 | while read f; do
            pyneat check "$f" --severity --format sarif --output "k8s-$(echo $f | sed 's|/|__|g').sarif" 2>/dev/null || true
          done
          echo "IaC scan complete"

  # ---------------------------------------------------------------------------
  # Stage 5: Summary and PR Status
  # ---------------------------------------------------------------------------
  summary:
    name: PR Security Summary
    runs-on: ubuntu-latest
    needs: [secrets-scan, security-scan, dependency-audit]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyNEAT
        run: pip install pyneat-cli==${{ env.PYNEAT_VERSION }}

      - name: Download all SARIF files
        uses: actions/download-artifact@v4
        with:
          pattern: "*.sarif"
          path: sarif-results
          merge-multiple: true

      - name: Generate PR summary
        run: |
          echo "## PyNEAT Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Secrets Scan | ${{ needs.secrets-scan.result == 'success' && '✅ Pass' || '⚠️ Issues Found' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Audit | ${{ needs.dependency-audit.result == 'success' && '✅ Pass' || '⚠️ Issues Found' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**View full results in the [Security tab](https://github.com/${{ github.repository }}/security/code-scanning).**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "*Generated by PyNEAT v${{ env.PYNEAT_VERSION }} • [Configure rules](.pyneat.toml) • [Documentation](https://pyneat.dev)*" >> $GITHUB_STEP_SUMMARY

      - name: Set PR status
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const results = ['secrets-scan', 'security-scan', 'dependency-audit'];
            const failures = results.filter(r => {
              const status = context.payload.check_runs?.find(cr => cr.name.includes(r))?.conclusion;
              return status === 'failure';
            });

            if (failures.length === 0) {
              console.log('All checks passed');
            }
