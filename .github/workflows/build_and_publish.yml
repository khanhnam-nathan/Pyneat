# PyNEAT Build and Publish Workflow
#
# Builds cross-platform Rust extension wheels and publishes to PyPI on release tags.
# Also runs tests on all supported Python versions.

name: Build & Publish

on:
  push:
    tags:
      - 'v*'
  pull_request:
    paths:
      - '**.py'
      - '**.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'pyproject.toml'
      - '.github/workflows/build_and_publish.yml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  MATURIN_VERSION: "1.7"

jobs:
  # ========================================
  # JOB 1: Build wheels (no PyPI secrets)
  # ========================================
  build-wheels:
    name: Build wheels (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']
        exclude:
          # macOS arm64 doesn't support Python 3.10
          - os: macos-latest
            python-version: '3.10'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install maturin
        run: |
          pip install maturin==${{ env.MATURIN_VERSION }}

      - name: Build wheels
        run: |
          maturin build --release --out dist --interpreter python${{ matrix.python-version }}
        working-directory: pyneat-rs

      - name: Upload wheels artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-py${{ matrix.python-version }}
          path: pyneat-rs/target/wheels/*.whl
          retention-days: 5

  # ========================================
  # JOB 2: Build source distribution
  # ========================================
  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    container: fedora:latest  # maturin needs Rust toolchain on Linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install maturin
        run: pip install maturin==${{ env.MATURIN_VERSION }}

      - name: Build sdist
        run: maturin build --release --sdist --out dist
        working-directory: pyneat-rs

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: pyneat-rs/target/wheels/*.tar.gz
          retention-days: 5

  # ========================================
  # JOB 3: Test (runs without PyPI secrets)
  # ========================================
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: build-wheels
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: wheels-ubuntu-latest-py${{ matrix.python-version }}
          path: wheels/

      - name: Install with Rust extension
        run: pip install wheels/*.whl ".[dev]"

      - name: Verify Rust extension loads
        run: python -c "import pyneat_rs; print('pyneat_rs version:', pyneat_rs.version())"

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  # ========================================
  # JOB 4: Publish to PyPI (only on tags)
  # ========================================
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist, test]
    if: startsWith(github.ref, 'refs/tags/v')

    environment:
      name: pypi
      url: https://pypi.org/project/pyneat-cli/

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  # ========================================
  # JOB 5: Publish to Test PyPI (PR preview)
  # ========================================
  publish-testpypi:
    name: Publish to Test PyPI
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist]
    if: github.event_name == 'pull_request'

    environment:
      name: testpypi
      url: https://test.pypi.org/project/pyneat-cli/

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Publish to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          repository-url: https://test.pypi.org/legacy/
