# PyNeat GitHub Actions Workflow
# Tests, property-based tests, and fuzzing for code correctness
#
# Features:
#   - Runs tests on multiple Python versions
#   - Property-based testing to verify semantics preserved
#   - Fuzzing tests for edge cases
#   - Code coverage report

name: CI Tests

on:
  push:
    branches: [main, master, develop]
    paths:
      - '**.py'
      - '.github/workflows/*.yml'
      - 'pyproject.toml'
  pull_request:
    paths:
      - '**.py'
      - '.github/workflows/*.yml'
      - 'pyproject.toml'
  workflow_dispatch:

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Run fuzzing tests
        run: |
          python -m pytest tests/test_fuzz.py -v --tb=short

      - name: Run property-based tests
        run: |
          python -m pytest tests/test_property.py -v --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: .pytest_cache/
          retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff pyflakes

      - name: Run Ruff
        run: |
          ruff check . --ignore E501,W503 || true

  stress-test:
    name: Stress Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run stress tests (monster code)
        run: |
          python -m pytest tests/test_stress.py -v

      - name: Run real-world integration tests
        run: |
          python -m pytest tests/test_real_world.py -v

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test, lint, stress-test]
    if: always()

    steps:
      - name: Check for failures
        run: |
          if [ "${{ needs.test.result }}" == "failure" ]; then
            echo "::error::Unit tests failed"
            exit 1
          fi
          if [ "${{ needs.stress-test.result }}" == "failure" ]; then
            echo "::error::Stress tests failed"
            exit 1
          fi
          echo "All tests passed!"

  pyneat-self-analysis:
    name: PyNeat Self-Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyNeat
        run: |
          pip install --upgrade pip
          pip install -e .

      - name: Run PyNeat on itself (dry-run)
        run: |
          python -m pyneat clean-dir pyneat --dry-run --diff

      - name: Verify package sources compile
        run: |
          python -m compileall -q pyneat
