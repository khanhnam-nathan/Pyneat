name: Scheduled Security Scan

on:
  schedule:
    # Run every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  security-scan:
    name: Weekly Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyNeat
        run: pip install pyneat

      - name: Run security scan
        run: |
          pyneat check . --format sarif --output security-scan.sarif

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: security-scan.sarif
          category: pyneat-scheduled-scan

      - name: Check for critical vulnerabilities
        id: check-critical
        run: |
          if grep -q '"level": "error"' security-scan.sarif; then
            echo "critical_found=true" >> $GITHUB_OUTPUT
          fi

      - name: Create issue for critical vulnerabilities
        if: steps.check-critical.outputs.critical_found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Weekly Security Scan: Critical Vulnerabilities Found',
              body: 'Automated weekly security scan found critical vulnerabilities. Please review and fix.\n\nGenerated by PyNeat.',
              labels: ['security', 'automated']
            })

  summary:
    name: Scan Summary
    runs-on: ubuntu-latest
    needs: security-scan
    if: always()

    steps:
      - name: Download SARIF
        uses: actions/download-artifact@v4
        with:
          name: security-scan.sarif
          path: .

      - name: Generate summary
        run: |
          echo "## Weekly Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Scan completed at: $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View detailed results in [Security tab](https://github.com/${{ github.repository }}/security/code-scanning)." >> $GITHUB_STEP_SUMMARY
