# PyNEAT CI/CD Workflow
#
# Runs tests, lint, security scan, coverage, and auto-export manifest on push/PR.

name: CI Tests

on:
  push:
    branches: [main, develop]
    paths:
      - '**.py'
      - '**.rs'
      - '.github/workflows/*.yml'
      - 'pyproject.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
  pull_request:
    paths:
      - '**.py'
      - '**.rs'
      - '.github/workflows/*.yml'
      - 'pyproject.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
  workflow_dispatch:

env:
  # Fail CI if coverage drops below this threshold
  COVERAGE_THRESHOLD: 70

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-cov

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --tb=short --cov=pyneat --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: .pytest_cache/
          retention-days: 7

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pip-audit
        run: |
          pip install pip-audit
          pip-audit || true

      - name: Check for sensitive data in commits
        run: |
          pip install detect-secrets
          detect-secrets scan || true

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff pyflakes

      - name: Run Ruff
        run: |
          ruff check . --ignore E501,W503 || true

  rust-security:
    name: Rust Security Audit
    runs-on: ubuntu-latest
    # Only run on changes to Rust code
    if: contains(github.event.head_commit.message, 'rust') || contains(github.event.pull_request.head.ref, 'rust') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run cargo-audit
        run: |
          cargo install cargo-audit || true
          cd pyneat-rs && cargo audit || true

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test, lint, security-audit]
    if: always()

    steps:
      - name: Check for failures
        run: |
          if [ "${{ needs.test.result }}" == "failure" ]; then
            echo "::error::Tests failed"
            exit 1
          fi
          echo "All tests passed!"

  pyneat-self-analysis:
    name: PyNeat Self-Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyNeat
        run: |
          pip install --upgrade pip
          pip install -e .

      # No --diff: full unified diffs for the whole package are huge on CI and can
      # destabilize runners; dry-run alone proves the CLI + engine run on Linux.
      - name: Run PyNeat on itself (dry-run)
        run: |
          python -m pyneat clean-dir pyneat --dry-run

      - name: Verify package sources compile
        run: |
          python -m compileall -q pyneat

  export-manifest:
    name: Export PyNEAT Manifest
    runs-on: ubuntu-latest
    # Run after self-analysis to avoid conflicts
    needs: [pyneat-self-analysis]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyNEAT
        run: |
          pip install --upgrade pip
          pip install -e .

      # Must not pass --diff: with --diff, clean-dir returns early and never writes manifest.
      - name: Export Manifest
        run: |
          python -m pyneat clean-dir pyneat --export-manifest

      - name: Upload Manifest Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pyneat-manifest
          path: |
            **/.pyneat.manifest.json
            **/*.pyneat.manifest.json
          retention-days: 7

      - name: Commit Manifest Changes
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          find . -not -path './.git/*' \( -name '.pyneat.manifest.json' -o -name '*.pyneat.manifest.json' \) -print -exec git add -f {} \;
          if git diff --cached --quiet; then
            echo "No manifest changes to commit"
          else
            git commit -m "ci: auto-update .pyneat.manifest.json [skip ci]" || echo "Commit failed (possibly no changes)"
          fi
        continue-on-error: true
